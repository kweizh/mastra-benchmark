h value: \u003cvalue\u003e\"`.\n4. Create a `lowValueStep` that takes `{ value: z.number() }` and returns `{ result: z.string() }` with the string `\"Low value: \u003cvalue\u003e\"`.\n5. Create a `finalStep` that takes the output of either branch (`'high-value-step'` or `'low-value-step'` output structure) and returns `{ message: z.string() }` containing the result string.\n6. Combine these into a workflow exported as `myWorkflow`. Use `.then(step1)`, then `.branch()` to route to `highValueStep` if `value \u003e 10` and `lowValueStep` if `value \u003c= 10`, and finally `.then(finalStep)` and `.commit()`.\n7. In `src/index.ts`, import the workflow, create a run, and execute it twice: once with `{ value: 15 }` and once with `{ value: 5 }`.\n8. Save the results of both runs as an array of objects `[ { message: \"High value: 15\" }, { message: \"Low value: 5\" } ]` to `output.json` in the project root.\n\n## Constraints\n- Project path: `/home/user/project`\n- Log file: `/home/user/project/output.json`\n- Start command: `npx tsx src/index.ts`"])</script><script>self.__next_f.push([1,"c:T699,"])</script><script>self.__next_f.push([1,"# Mastra Human-in-the-Loop Workflow\n\n## Background\nMastra workflows can be paused at any step to wait for external input or approval (Human-in-the-loop). When a workflow is suspended, its current execution state is saved. You can later resume the workflow run, providing the required `resumeData`.\n\n## Requirements\nCreate a Node.js project using Mastra that implements a Human-in-the-loop workflow.\n\n1. Initialize a Node.js project in `/home/user/mastra-app`.\n2. Install `@mastra/core`, `zod`, `typescript`, `tsx`, and `@types/node`.\n3. Create `workflow.ts` that defines and exports a workflow named `contentApprovalWorkflow`:\n   - Input schema: `{ content: z.string() }`\n   - Output schema: `{ result: z.string() }`\n   - It should have a step `reviewStep` that suspends execution if `resumeData` is not provided. To suspend, use `await suspend()`.\n   - `resumeSchema` should be `{ approved: z.boolean() }`.\n   - If resumed and `resumeData.approved` is true, the step output `result` should be `\"Publish: \" + content`.\n   - If `resumeData.approved` is false, `result` should be `\"Discard: \" + content`.\n   - The workflow output should match the step's output.\n4. Create `run.ts` that:\n   - Initializes a Mastra instance with `contentApprovalWorkflow`.\n   - Starts a run with input `{ content: \"Hello World\" }`.\n   - Checks if the run status is `\"suspended\"`.\n   - Resumes the run with `resumeData: { approved: true }`.\n   - Writes the final workflow result object (e.g., `{\"result\": \"Publish: Hello World\"}`) to `/home/user/mastra-app/output.json`.\n\n## Constraints\n- Project path: `/home/user/mastra-app`\n- Output file: `/home/user/mastra-app/output.json`\n- Start command: `npx tsx run.ts`"])</script><script>self.__next_f.push([1,"d:T5d3,"])</script><script>self.__next_f.push([1,"# Configure a Supervisor Agent to Coordinate Sub-Agents in Mastra\n\n## Background\nMastra is a TypeScript AI agent framework. You need to configure a Supervisor agent that coordinates two sub-agents: a 'Coder' and a 'Reviewer', using shared memory.\n\n## Requirements\n- You have an empty directory at `/home/user/project`.\n- Initialize a Node.js project in `/home/user/project`.\n- Install `@mastra/core`, `@mastra/memory`, and `zod`.\n- Create a `src/index.ts` file that exports a `Mastra` instance.\n- Create three agents: `coder`, `reviewer`, and `supervisor`.\n- The `coder` agent should be configured with instructions to write TypeScript code.\n- The `reviewer` agent should be configured with instructions to review TypeScript code for security and performance.\n- The `supervisor` agent should have instructions to coordinate the `coder` and `reviewer` to complete a user request.\n- All three agents must share the same `Memory` instance to retain conversational context.\n- The `Mastra` instance must register all thre
